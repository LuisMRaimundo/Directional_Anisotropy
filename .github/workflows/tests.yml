name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=anisotropia --cov-report=term-missing --cov-fail-under=78

      - name: Compare frozen corpus reference outputs
        run: python corpus/scripts/compare_reference_outputs.py

      - name: Ruff
        run: |
          pip install ruff
          ruff check anisotropia tests corpus/benchmark_profile.py
